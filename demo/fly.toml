# Tollway Demo — fly.io config
# Deploy with: fly launch --config demo/fly.toml

app = "tollway-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Build context is the demo/ directory (run fly deploy from demo/)

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
